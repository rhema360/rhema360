<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canal YT Hispanos USA — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0b0d;
    --surface:  #111318;
    --border:   #1e2129;
    --dim:      #2a2d38;
    --muted:    #4a4f63;
    --text:     #c8ccd8;
    --bright:   #e8ecf4;
    --accent:   #7c6af7;
    --green:    #22c55e;
    --yellow:   #f59e0b;
    --red:      #ef4444;
    --cyan:     #06b6d4;
    --pink:     #ec4899;

    --glow-0: #7c6af7;
    --glow-1: #06b6d4;
    --glow-2: #22c55e;
    --glow-3: #f59e0b;
    --glow-4: #ec4899;
    --glow-5: #f97316;
    --glow-6: #a855f7;
    --glow-7: #14b8a6;

    --radius: 8px;
    --font-ui: 'Syne', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

  /* ── Layout ── */
  .container { max-width: 960px; margin: 0 auto; padding: 0 20px 80px; }

  /* ── Header ── */
  .header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .header-title {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    color: var(--bright);
    line-height: 1.1;
    margin-bottom: 10px;
  }
  .header-sub {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
  }
  .header-sub span { color: var(--green); }

  /* ── Global Progress Bar ── */
  .global-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .gp-circle { flex-shrink: 0; }
  .gp-info { flex: 1; }
  .gp-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
    font-family: var(--font-mono);
  }
  .gp-title { font-size: 20px; font-weight: 700; color: var(--bright); }
  .gp-bar-wrap {
    height: 4px;
    background: var(--dim);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .gp-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .gp-tasks {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* SVG Circle */
  .svg-circle { transform: rotate(-90deg); }
  .circle-bg { fill: none; stroke: var(--dim); stroke-width: 4; }
  .circle-fg {
    fill: none;
    stroke: url(#grad);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease;
  }
  .circle-text {
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    fill: var(--bright);
    text-anchor: middle;
    dominant-baseline: middle;
    transform: rotate(90deg);
  }

  /* ── Canal Config ── */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 32px;
  }
  .config-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .config-title {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--cyan);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .config-body { margin-top: 16px; }
  .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .config-field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .config-field input {
    width: 100%;
    background: var(--dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--bright);
    outline: none;
    transition: border-color 0.2s;
  }
  .config-field input:focus { border-color: var(--accent); }
  .config-field input::placeholder { color: var(--muted); }
  .config-save {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .config-save:hover { opacity: 0.85; }
  .config-saved {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--green);
    margin-left: 10px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .config-saved.show { opacity: 1; }

  /* ── Phase Navigation ── */
  .phase-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .phase-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .phase-dot:hover { border-color: var(--text); color: var(--text); }
  .phase-dot.active { color: #fff; border-color: transparent; }
  .phase-dot.done { border-color: transparent; }

  /* ── Phase Cards ── */
  .phase {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: box-shadow 0.3s;
    scroll-margin-top: 20px;
  }
  .phase:hover { box-shadow: 0 0 0 1px var(--dim); }

  .phase-header {
    padding: 20px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    user-select: none;
  }
  .phase-num {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    min-width: 40px;
  }
  .phase-meta { flex: 1; }
  .phase-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--bright);
    margin-bottom: 3px;
  }
  .phase-timeline {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
  }
  .phase-stats {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .phase-badge {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--dim);
    color: var(--muted);
  }
  .phase-chevron {
    width: 20px;
    height: 20px;
    color: var(--muted);
    transition: transform 0.3s;
  }
  .phase.open .phase-chevron { transform: rotate(180deg); }
  .phase-mini-bar {
    width: 60px;
    height: 3px;
    background: var(--dim);
    border-radius: 2px;
    overflow: hidden;
  }
  .phase-mini-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* Glow accent per phase */
  .phase[data-phase="0"] { --phase-color: var(--glow-0); }
  .phase[data-phase="1"] { --phase-color: var(--glow-1); }
  .phase[data-phase="2"] { --phase-color: var(--glow-2); }
  .phase[data-phase="3"] { --phase-color: var(--glow-3); }
  .phase[data-phase="4"] { --phase-color: var(--glow-4); }
  .phase[data-phase="5"] { --phase-color: var(--glow-5); }
  .phase[data-phase="6"] { --phase-color: var(--glow-6); }
  .phase[data-phase="7"] { --phase-color: var(--glow-7); }

  .phase.open {
    box-shadow: 0 0 24px -8px var(--phase-color),
                0 0 0 1px color-mix(in srgb, var(--phase-color) 30%, transparent);
  }
  .phase-header .phase-num { color: var(--phase-color); }
  .phase-mini-fill { background: var(--phase-color); }

  /* ── Phase Body ── */
  .phase-body { display: none; padding: 0 24px 24px; }
  .phase.open .phase-body { display: block; }

  /* ── KPIs ── */
  .kpi-strip {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .kpi {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    min-width: 120px;
  }
  .kpi-val {
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--bright);
    margin-bottom: 2px;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Prompts ── */
  .prompts-section { margin-bottom: 20px; }
  .prompts-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .prompt-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .prompt-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .prompt-header:hover { background: var(--surface); }
  .prompt-icon {
    font-size: 14px;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .prompt-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    flex: 1;
  }
  .prompt-preview {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 240px;
  }
  .prompt-arrow {
    font-size: 10px;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .prompt-card.open .prompt-arrow { transform: rotate(180deg); }
  .prompt-body { display: none; }
  .prompt-card.open .prompt-body { display: block; }
  .prompt-text {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.7;
    color: var(--text);
    background: #06080b;
    border-top: 1px solid var(--border);
    padding: 16px;
    white-space: pre-wrap;
    position: relative;
  }
  .prompt-copy {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    background: var(--dim);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .prompt-copy:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .prompt-copy.copied { background: var(--green); color: #fff; border-color: var(--green); }

  /* ── Tasks ── */
  .tasks-section {}
  .tasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .tasks-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tasks-clear {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.2s;
  }
  .tasks-clear:hover { color: var(--red); }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { opacity: 0.85; }
  .task-check {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--dim);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .task-item.done .task-check {
    background: var(--phase-color, var(--accent));
    border-color: var(--phase-color, var(--accent));
  }
  .task-check svg { display: none; }
  .task-item.done .task-check svg { display: block; }
  .task-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    transition: color 0.2s;
  }
  .task-item.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--dim);
  }
  .task-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 3px;
    background: var(--dim);
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 3px;
    white-space: nowrap;
  }
  .tag-ia   { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); }
  .tag-make { background: color-mix(in srgb, var(--cyan) 15%, transparent); color: var(--cyan); }
  .tag-yt   { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); }
  .tag-neg  { background: color-mix(in srgb, var(--green) 15%, transparent); color: var(--green); }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 40px 0 20px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 48px;
  }
  .footer span { color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .global-progress { flex-direction: column; align-items: flex-start; gap: 14px; }
    .kpi-strip { gap: 8px; }
    .kpi { min-width: 100px; }
    .prompt-preview { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="header-tag">// sistema activo</div>
    <h1 class="header-title">Canal YouTube<br>Hispanos USA</h1>
    <div class="header-sub">Meta: <span>$5,000+/mes</span> · 4-7 hrs/semana · IA + Make.com</div>
  </header>

  <!-- Global Progress -->
  <div class="global-progress">
    <div class="gp-circle">
      <svg width="72" height="72" viewBox="0 0 72 72" class="svg-circle">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#7c6af7"/>
            <stop offset="100%" style="stop-color:#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="circle-bg" cx="36" cy="36" r="30"/>
        <circle class="circle-fg" id="global-ring" cx="36" cy="36" r="30"
          stroke-dasharray="188.5" stroke-dashoffset="188.5"/>
        <text class="circle-text" x="36" y="36" id="global-pct">0%</text>
      </svg>
    </div>
    <div class="gp-info">
      <div class="gp-label">// progreso total</div>
      <div class="gp-title" id="gp-title-text">Empezando...</div>
      <div class="gp-bar-wrap"><div class="gp-bar" id="gp-bar" style="width:0%"></div></div>
      <div class="gp-tasks" id="gp-tasks">0 / 0 tareas completadas</div>
    </div>
  </div>

  <!-- Canal Config -->
  <div class="config-panel">
    <div class="config-header" onclick="toggleConfig()">
      <span class="config-title">// config del canal</span>
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="config-chev" style="color:var(--muted);transition:transform .3s"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="config-body" id="config-body" style="display:none">
      <div class="config-grid">
        <div class="config-field">
          <label>Nombre del canal</label>
          <input type="text" id="cfg-nombre" placeholder="ej: Vive USA Today">
        </div>
        <div class="config-field">
          <label>Nicho elegido</label>
          <input type="text" id="cfg-nicho" placeholder="ej: Finanzas para hispanos">
        </div>
        <div class="config-field">
          <label>Tema principal</label>
          <input type="text" id="cfg-tema" placeholder="ej: Crédito, impuestos, ITIN">
        </div>
        <div class="config-field">
          <label>Avatar objetivo</label>
          <input type="text" id="cfg-avatar" placeholder="ej: Migrante 25-40 años, Texas">
        </div>
        <div class="config-field">
          <label>Meta mes 6</label>
          <input type="text" id="cfg-meta6" placeholder="ej: $1,000/mes">
        </div>
        <div class="config-field">
          <label>Meta mes 12</label>
          <input type="text" id="cfg-meta12" placeholder="ej: $5,000/mes">
        </div>
      </div>
      <button class="config-save" onclick="saveConfig()">Guardar config</button>
      <span class="config-saved" id="config-saved">✓ guardado</span>
    </div>
  </div>

  <!-- Phase Nav -->
  <div class="phase-nav" id="phase-nav"></div>

  <!-- Phases -->
  <div id="phases-container"></div>

  <footer class="footer">
    Construido con <span>IA</span> · Automatizado con <span>Make.com</span> · Tu canal, tu reglas
  </footer>
</div>

  {

      { val: "Avatar", label: "Documentado" }
    ],

// ── State ─────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'yt-hispanos-v1';

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { tasks: {}, config: {} };
  } catch { return { tasks: {}, config: {} }; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ── Helpers ───────────────────────────────────────────────────────────────────

function taskKey(phaseId, taskIdx) { return `p${phaseId}_t${taskIdx}`; }

function getPhaseProgress(phase) {
  const total = phase.tasks.length;
  const done = phase.tasks.filter((_, i) => state.tasks[taskKey(phase.id, i)]).length;
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function getGlobalProgress() {
  let totalDone = 0, totalAll = 0;
  PHASES.forEach(p => {
    const { done, total } = getPhaseProgress(p);
    totalDone += done; totalAll += total;
  });
  return { done: totalDone, total: totalAll, pct: totalAll ? Math.round(totalDone / totalAll * 100) : 0 };
}

function phaseColor(phaseId) {
  const colors = ['#7c6af7','#06b6d4','#22c55e','#f59e0b','#ec4899','#f97316','#a855f7','#14b8a6'];
  return colors[phaseId] || '#7c6af7';
}

function statusLabel(pct) {
  if (pct === 0)   return 'Empezando...';
  if (pct < 25)    return 'En marcha 🚀';
  if (pct < 50)    return 'Progresando bien';
  if (pct < 75)    return 'Más de la mitad';
  if (pct < 100)   return 'Casi listo!';
  return '¡Canal LISTO! 🏆';
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderAll() {
  renderNav();
  renderPhases();
  renderGlobal();
}

function renderNav() {
  const nav = document.getElementById('phase-nav');
  nav.innerHTML = PHASES.map(p => {
    const { pct } = getPhaseProgress(p);
    const color = phaseColor(p.id);
    const style = pct > 0
      ? `background:${color};color:#fff;border-color:${color}`
      : '';
    const cls = pct > 0 ? (pct === 100 ? 'done' : 'active') : '';
    return `<div class="phase-dot ${cls}" style="${style}" onclick="scrollToPhase(${p.id})" title="Fase ${p.id}: ${p.name}">${p.id}</div>`;
  }).join('');
}

function renderPhases() {
  const container = document.getElementById('phases-container');
  container.innerHTML = PHASES.map(p => renderPhase(p)).join('');
  // attach task click handlers
  PHASES.forEach(p => {
    p.tasks.forEach((_, i) => {
      const el = document.querySelector(`[data-task="${taskKey(p.id, i)}"]`);
      if (el) el.addEventListener('click', () => toggleTask(p.id, i));
    });
    // prompt toggles
    p.prompts.forEach((_, pi) => {
      const el = document.querySelector(`[data-prompt="${p.id}-${pi}"]`);
      if (el) el.querySelector('.prompt-header').addEventListener('click', () => togglePrompt(p.id, pi));
      const copyBtn = el ? el.querySelector('.prompt-copy') : null;
      if (copyBtn) copyBtn.addEventListener('click', (e) => { e.stopPropagation(); copyPrompt(p.id, pi, copyBtn); });
    });
    // phase header toggle
    const phaseEl = document.getElementById(`phase-${p.id}`);
    if (phaseEl) phaseEl.querySelector('.phase-header').addEventListener('click', () => togglePhase(p.id));
    // tasks clear
    const clearBtn = document.getElementById(`clear-${p.id}`);
    if (clearBtn) clearBtn.addEventListener('click', (e) => { e.stopPropagation(); clearPhase(p.id); });
  });
}

function renderPhase(p) {
  const { done, total, pct } = getPhaseProgress(p);
  const color = phaseColor(p.id);
  const isOpen = document.getElementById(`phase-${p.id}`)?.classList.contains('open') || false;
  const openClass = isOpen ? ' open' : '';

  const kpisHtml = p.kpis.map(k => `
    <div class="kpi">
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-label">${k.label}</div>
    </div>`).join('');

  const promptsHtml = p.prompts.map((pr, pi) => {
    const isPromptOpen = document.querySelector(`[data-prompt="${p.id}-${pi}"]`)?.classList.contains('open') || false;
    const preview = pr.text.replace(/\n/g,' ').substring(0, 60) + '...';
    return `
    <div class="prompt-card${isPromptOpen ? ' open' : ''}" data-prompt="${p.id}-${pi}">
      <div class="prompt-header">
        <span class="prompt-icon">${pr.icon}</span>
        <span class="prompt-label">${pr.label}</span>
        <span class="prompt-preview">${preview}</span>
        <span class="prompt-arrow">▼</span>
      </div>
      <div class="prompt-body">
        <div class="prompt-text"><button class="prompt-copy">copiar</button>${escHtml(pr.text)}</div>
      </div>
    </div>`;
  }).join('');

  const tasksHtml = p.tasks.map((t, i) => {
    const key = taskKey(p.id, i);
    const done = state.tasks[key];
    const tagClass = { ia:'tag-ia', make:'tag-make', yt:'tag-yt', neg:'tag-neg' }[t.tag] || '';
    const tagLabel = { ia:'IA', make:'Make.com', yt:'YouTube', neg:'Negocio' }[t.tag] || t.tag;
    return `
    <div class="task-item${done ? ' done' : ''}" data-task="${key}" style="--phase-color:${color}">
      <div class="task-check">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-text">${t.text}</div>
      <span class="task-tag ${tagClass}">${tagLabel}</span>
    </div>`;
  }).join('');

  return `
  <div class="phase${openClass}" id="phase-${p.id}" data-phase="${p.id}">
    <div class="phase-header">
      <div class="phase-num">FASE ${p.id}</div>
      <div class="phase-meta">
        <div class="phase-name">${p.name}</div>
        <div class="phase-timeline">${p.timeline}</div>
      </div>
      <div class="phase-stats">
        <div class="phase-badge">${done}/${total}</div>
        <div class="phase-mini-bar"><div class="phase-mini-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>
      <svg class="phase-chevron" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="phase-body">
      <div class="kpi-strip">${kpisHtml}</div>
      <div class="prompts-section">
        <div class="prompts-title">// prompts de IA</div>
        ${promptsHtml}
      </div>
      <div class="tasks-section">
        <div class="tasks-header">
          <div class="tasks-title">// tareas</div>
          <button class="tasks-clear" id="clear-${p.id}">limpiar fase</button>
        </div>
        ${tasksHtml}
      </div>
    </div>
  </div>`;
}

function renderGlobal() {
  const { done, total, pct } = getGlobalProgress();
  const circumference = 188.5;
  const offset = circumference - (pct / 100 * circumference);
  const ring = document.getElementById('global-ring');
  const pctEl = document.getElementById('global-pct');
  const bar = document.getElementById('gp-bar');
  const title = document.getElementById('gp-title-text');
  const tasks = document.getElementById('gp-tasks');
  if (ring) ring.style.strokeDashoffset = offset;
  if (pctEl) pctEl.textContent = pct + '%';
  if (bar) bar.style.width = pct + '%';
  if (title) title.textContent = statusLabel(pct);
  if (tasks) tasks.textContent = `${done} / ${total} tareas completadas`;
}

// ── Interactions ──────────────────────────────────────────────────────────────

function togglePhase(phaseId) {
  const el = document.getElementById(`phase-${phaseId}`);
  if (!el) return;
  el.classList.toggle('open');
}

function scrollToPhase(phaseId) {
  const el = document.getElementById(`phase-${phaseId}`);
  if (!el) return;
  el.classList.add('open');
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleTask(phaseId, taskIdx) {
  const key = taskKey(phaseId, taskIdx);
  state.tasks[key] = !state.tasks[key];
  saveState(state);
  // update just this task item
  const el = document.querySelector(`[data-task="${key}"]`);
  if (el) el.classList.toggle('done', state.tasks[key]);
  // update phase badge + bar
  const phase = PHASES.find(p => p.id === phaseId);
  const { done, total, pct } = getPhaseProgress(phase);
  const phaseEl = document.getElementById(`phase-${phaseId}`);
  if (phaseEl) {
    const badge = phaseEl.querySelector('.phase-badge');
    const fill = phaseEl.querySelector('.phase-mini-fill');
    if (badge) badge.textContent = `${done}/${total}`;
    if (fill) fill.style.width = pct + '%';
  }
  renderGlobal();
  renderNav();
}

function clearPhase(phaseId) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  phase.tasks.forEach((_, i) => delete state.tasks[taskKey(phaseId, i)]);
  saveState(state);
  // re-render that phase body
  const phaseEl = document.getElementById(`phase-${phaseId}`);
  const wasOpen = phaseEl?.classList.contains('open');
  const tempContainer = document.createElement('div');
  tempContainer.innerHTML = renderPhase(phase);
  const newPhase = tempContainer.firstElementChild;
  if (wasOpen) newPhase.classList.add('open');
  phaseEl.replaceWith(newPhase);
  // re-attach handlers for this phase
  phase.tasks.forEach((_, i) => {
    const el = document.querySelector(`[data-task="${taskKey(phaseId, i)}"]`);
    if (el) el.addEventListener('click', () => toggleTask(phaseId, i));
  });
  phase.prompts.forEach((_, pi) => {
    const el = document.querySelector(`[data-prompt="${phaseId}-${pi}"]`);
    if (el) el.querySelector('.prompt-header').addEventListener('click', () => togglePrompt(phaseId, pi));
    const copyBtn = el ? el.querySelector('.prompt-copy') : null;
    if (copyBtn) copyBtn.addEventListener('click', (e) => { e.stopPropagation(); copyPrompt(phaseId, pi, copyBtn); });
  });
  document.getElementById(`clear-${phaseId}`)?.addEventListener('click', (e) => { e.stopPropagation(); clearPhase(phaseId); });
  renderGlobal();
  renderNav();
}

function togglePrompt(phaseId, promptIdx) {
  const el = document.querySelector(`[data-prompt="${phaseId}-${promptIdx}"]`);
  if (el) el.classList.toggle('open');
}

function copyPrompt(phaseId, promptIdx, btn) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  const text = phase.prompts[promptIdx].text;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ copiado';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    btn.textContent = 'error';
    setTimeout(() => { btn.textContent = 'copiar'; }, 2000);
  });
}

function toggleConfig() {
  const body = document.getElementById('config-body');
  const chev = document.getElementById('config-chev');
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  chev.style.transform = open ? '' : 'rotate(180deg)';
}

function saveConfig() {
  state.config = {
    nombre: document.getElementById('cfg-nombre').value,
    nicho:  document.getElementById('cfg-nicho').value,
    tema:   document.getElementById('cfg-tema').value,
    avatar: document.getElementById('cfg-avatar').value,
    meta6:  document.getElementById('cfg-meta6').value,
    meta12: document.getElementById('cfg-meta12').value,
  };
  saveState(state);
  const saved = document.getElementById('config-saved');
  saved.classList.add('show');
  setTimeout(() => saved.classList.remove('show'), 2000);
}

function loadConfig() {
  const c = state.config || {};
  const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.value = val; };
  set('cfg-nombre', c.nombre);
  set('cfg-nicho',  c.nicho);
  set('cfg-tema',   c.tema);
  set('cfg-avatar', c.avatar);
  set('cfg-meta6',  c.meta6);
  set('cfg-meta12', c.meta12);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  renderAll();
  loadConfig();
  // open phase 0 by default if nothing is open
  const first = document.getElementById('phase-0');
  if (first && !first.classList.contains('open')) {
    first.classList.add('open');
  }
});
</script>
